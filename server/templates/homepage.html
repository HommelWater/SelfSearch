<!DOCTYPE html>
<html>
<body>
    <h1>Search Test</h1>
    <form id="searchForm">
        <input type="text" id="searchQuery" placeholder="Enter search...">
        <button type="submit">Search</button>
    </form>
    <div id="searchResults"></div>

    <h1>Index Test</h1>
    <form id="indexForm">
        <input type="text" id="indexText" placeholder="Enter text to index...">
        <input type="text" id="docTitle" placeholder="Document title...">
        <input type="text" id="docLink" placeholder="Document link...">
        <button type="submit">Index</button>
    </form>
    <div id="indexStatus"></div>

    <script>
        // Handle search form submission
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const query = document.getElementById('searchQuery').value;
            
            const response = await fetch('/search', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ query })
            });
            
            const results = await response.json();
            document.getElementById('searchResults').innerHTML = 
                `<pre>${JSON.stringify(results, null, 2)}</pre>`;
        });

        // Handle index form submission
        document.getElementById('indexForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = document.getElementById('indexText').value;
            const title = document.getElementById('docTitle').value;
            const link = document.getElementById('docLink').value;
            
            const response = await fetch('/index', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    text, 
                    title: title || "Untitled", 
                    link: link || "#" 
                })
            });
            
            const status = await response.json();
            document.getElementById('indexStatus').innerHTML = 
                `<p>Indexing status: ${JSON.stringify(status)}</p>`;
        });
    </script>
</body>
</html>
